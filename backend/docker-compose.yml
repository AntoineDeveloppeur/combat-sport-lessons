services:
  postgres:
    image: postgres:16
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - ./src/infrastructure/postSQL/init.sql:/docker-entrypoint-initdb.d/init.sql

volumes:
  postgres_combat_data:
