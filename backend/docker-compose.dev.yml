services:
  postgres:
    container_name: combat_lesson_db
    restart: "no"
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_combat_data:/var/lib/postgresql/data

  postgres_test:
    image: postgres:16
    container_name: combat_lesson_test_db
    restart: "no"
    environment:
      - POSTGRES_USER=${POSTGRES_TEST_USER}
      - POSTGRES_PASSWORD=${POSTGRES_TEST_PASSWORD}
      - POSTGRES_DB=${POSTGRES_TEST_DB}
    ports:
      - "${POSTGRES_TEST_PORT}:5432"
    volumes:
      - postgres_combat_test_data:/var/lib/postgresql/data
      - ./src/infrastructure/postSQL/init.test.sql:/docker-entrypoint-initdb.d/init.test.sql

  # Optionnal for debugging
  # pgadmin:
  #   image: dpage/pgadmin4:latest
  #   container_name: pgadmin
  #   restart: "no"
  #   profiles:
  #     - tools
  #   environment:
  #     PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
  #     PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
  #   ports:
  #     - "${PGADMIN_PORT}:80"
  #   volumes:
  #     - pgadmin_data:/var/lib/pgadmin

volumes:
  postgres_combat_test_data:
